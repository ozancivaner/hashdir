name: Tests (Windows)

on:
  workflow_dispatch:
  push:
    branches:
    - main
    - 'release/**'
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run Tests
      shell: bash
      run: make test-pinned-regression
